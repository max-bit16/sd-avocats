<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — SD Avocats</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#F2EDE3;--ink:#161310;--body:#5A5249;--mute:#948B7C;
    --hair:rgba(22,19,16,.14);--on-ink:#F2EDE3;--on-ink-mute:#ACA597;
    --on-ink-hair:rgba(242,237,227,.16);
    --accent:#B5121B;--accent-soft:#C44930;
    --container:1480px;--gutter:clamp(20px,4vw,56px);
    --t-display:'Spectral','Times New Roman',serif;
    --t-body:'Manrope','Helvetica Neue',Arial,sans-serif;
    --t-mono:'JetBrains Mono',ui-monospace,monospace;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{background:var(--ink);color:var(--on-ink);font-family:var(--t-body);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:var(--canvas)}
  .wrap{max-width:var(--container);margin:0 auto;padding:0 var(--gutter)}

  .nav{padding:clamp(14px,1.6vw,22px) 0;border-bottom:1px solid var(--on-ink-hair)}
  .nav .inner{display:flex;align-items:center;justify-content:space-between;gap:24px}
  .brand{display:flex;align-items:center;gap:14px;font-family:var(--t-display);font-size:16px;letter-spacing:.12em;text-transform:uppercase;font-weight:500}
  .brand .mono-tail{font-family:var(--t-mono);font-size:10.5px;letter-spacing:.14em;font-weight:400;opacity:.55;padding-left:6px;border-left:1px solid rgba(242,237,227,.32);text-transform:none}

  .main{flex:1;display:flex;align-items:center;padding:clamp(64px,10vw,140px) 0}
  .error-wrap{display:flex;flex-direction:column;gap:clamp(28px,3.6vw,48px)}
  .error-code{font-family:var(--t-display);font-style:italic;font-weight:300;font-size:clamp(96px,16vw,220px);line-height:1;letter-spacing:-.04em;color:rgba(242,237,227,.06);margin:0;pointer-events:none;user-select:none}
  .error-body{display:flex;flex-direction:column;gap:20px;max-width:40ch}
  .error-label{font-family:var(--t-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-ink-mute)}
  .error-title{font-family:var(--t-display);font-weight:400;font-size:clamp(28px,3.4vw,48px);line-height:1.08;letter-spacing:-.012em;margin:0;color:var(--on-ink)}
  .error-title em{font-style:italic;color:var(--accent-soft)}
  .error-sub{font-size:15px;line-height:1.65;color:var(--on-ink-mute);margin:0}
  .back-link{display:inline-flex;align-items:center;gap:14px;font-size:13px;letter-spacing:.06em;padding-bottom:6px;border-bottom:1px solid rgba(242,237,227,.28);transition:gap .25s var(--ease),color .25s var(--ease),border-color .25s var(--ease);color:var(--on-ink)}
  .back-link:hover{gap:22px;color:var(--accent-soft);border-bottom-color:var(--accent-soft)}
  .back-link svg{width:16px;height:10px}

  footer{padding:24px 0;border-top:1px solid var(--on-ink-hair)}
  footer .inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-family:var(--t-mono);font-size:11px;letter-spacing:.08em;color:var(--on-ink-mute)}
  footer a:hover{color:var(--accent-soft)}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <div class="inner">
      <a href="/" class="brand">
        <span style="font-family:var(--t-display);font-style:italic;color:var(--accent)">SD</span>
        <span>Avocats</span>
        <span class="mono-tail">aarpi</span>
      </a>
      <a href="/" style="font-size:13px;opacity:.7">← Retour à l'accueil</a>
    </div>
  </div>
</header>

<main class="main">
  <div class="wrap">
    <div class="error-wrap">
      <div class="error-code" aria-hidden="true">404</div>
      <div class="error-body">
        <div class="error-label">Erreur · Page introuvable</div>
        <h1 class="error-title">Cette page<br>n'<em>existe pas</em>.</h1>
        <p class="error-sub">L'adresse demandée est introuvable ou a été déplacée. Revenez à l'accueil ou consultez nos pages principales.</p>
        <a href="/" class="back-link">
          Retour à l'accueil
          <svg viewBox="0 0 18 10" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M0 5h17M13 1l4 4-4 4"/></svg>
        </a>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="inner">
      <span>© SD Avocats AARPI · 2026</span>
      <div style="display:flex;gap:24px">
        <a href="/competences">Compétences</a>
        <a href="/notre-equipe">Notre équipe</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
